name: jobpet
description: "职宠小窝 - 轻拟人电子宠物求职陪伴APP"
publish_to: 'none'
version: 1.0.2+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  provider: ^6.1.1
  sqflite: ^2.3.2
  sqflite_common_ffi: ^2.3.3
  path: ^1.9.0
  dio: ^5.4.0
  lottie: ^3.1.0
  shared_preferences: ^2.2.2
  sensors_plus: ^4.0.2
  cached_network_image: ^3.3.1
  path_provider: ^2.1.2
  intl: ^0.19.0
  logger: ^2.0.2
  fl_chart: ^0.66.0
  flutter_svg: ^2.0.9
  flutter_animate: ^4.3.0
  flame: ^1.18.0
  flutter_html: ^3.0.0-beta.2
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  url_launcher: ^6.2.5
  crypto: ^3.0.3

  # 安全相关依赖
  flutter_secure_storage: ^9.0.0
  device_info_plus: ^9.1.0
  platform: ^3.1.0

  # AI SDK
  google_generative_ai: ^0.4.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/images/
    - assets/images/pet/
    - assets/data/
    - assets/config/
    - assets/config/ai_config.json
